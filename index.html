<script>
async function sha256(msg){
  var buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0")}).join("");
}
function xorDecrypt(b64,key){
  var raw=atob(b64);var result=[];
  for(var i=0;i<raw.length;i++){result.push(String.fromCharCode(raw.charCodeAt(i)^key.charCodeAt(i%key.length)));}
  return result.join("");
}
async function checkPw(){
  var pw=document.getElementById("pwInput").value;
  var hash=await sha256(pw);
  if(hash==="6846912019f9d007fe7dddb8b8582d06b5962d6b7a17de3e574c298e9b8feaf5"){
    try{
      var decrypted=xorDecrypt(ENCRYPTED_DATA,pw);
      DATA=JSON.parse(decrypted);
      document.getElementById("loginOverlay").style.display="none";
      initMap();
    }catch(e){
      document.getElementById("pwError").style.display="block";
      document.getElementById("pwError").textContent="Decryption error. Please try again.";
    }
  }else{
    document.getElementById("pwError").style.display="block";
    document.getElementById("pwInput").value="";
    document.getElementById("pwInput").focus();
  }
}
document.addEventListener("DOMContentLoaded",function(){document.getElementById("pwInput").focus()});
</script>

var map = L.map("map").setView([53.5,-2.0],6);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:"&copy; OpenStreetMap contributors",maxZoom:18
}).addTo(map);

var clusters = L.markerClusterGroup({maxClusterRadius:40,spiderfyOnMaxZoom:true,showCoverageOnHover:false});
var allMarkers = [];

function makeIcon(color){
  return L.divIcon({className:"",html:'<div class="marker-pin" style="background:'+color+'"></div>',iconSize:[14,14],iconAnchor:[7,7],popupAnchor:[0,-10]});
}

function esc(s){
  var d=document.createElement("div");d.textContent=s||"";return d.innerHTML;
}

function fmt(n){
  return n?"\u00a3"+n.toLocaleString("en-GB",{minimumFractionDigits:0}):"\u00a30";
}

function buildPopup(d){
  var assets="";
  if(d.assets&&d.assets.length){
    assets=d.assets.map(function(a){return esc(a)}).join("<br>");
  }
  return '<div style="min-width:280px;font-family:Arial,sans-serif">'
    +'<h3 class="popup-title">'+esc(d.name)+'</h3>'
    +'<table class="popup-table">'
    +'<tr><td class="popup-label">Address:</td><td>'+esc(d.address)+'<br>'+esc(d.city)+' '+esc(d.pc)+'</td></tr>'
    +'<tr><td class="popup-label">Industry:</td><td>'+esc(d.industry)+'</td></tr>'
    +'<tr><td class="popup-label">Account Owner:</td><td>'+esc(d.owner)+'</td></tr>'
    +'<tr><td class="popup-label">Annual Revenue:</td><td class="popup-revenue">'+fmt(d.revenue)+'</td></tr>'
    +'<tr><td class="popup-label">Support Plan:</td><td>'+esc(d.sp)+'</td></tr>'
    +'<tr><td class="popup-label">Assets:</td><td class="popup-assets">'+assets+'</td></tr>'
    +'</table></div>';
}

/* Create markers with fallback coords first, then refine via API */
function initMap(){
document.getElementById("map").style.visibility="visible";
document.getElementById("mainHeader").style.visibility="visible";
document.getElementById("searchBox").style.visibility="visible";
document.getElementById("filtersPanel").style.visibility="visible";
map.invalidateSize();

DATA.forEach(function(d){
  var m = L.marker([d.lat, d.lng], {icon: makeIcon("#2d8a4e")});
  m.bindPopup(buildPopup(d), {maxWidth:350});
  m._cdata = d;
  allMarkers.push(m);
  clusters.addLayer(m);
});
map.addLayer(clusters);

/* Live geocode postcodes via postcodes.io in batches of 100 */
function geocodeAndUpdate(){
  var ukPostcodes = {};
  DATA.forEach(function(d, i){
    var pc = (d.pc||"").trim().toUpperCase();
    if(/^[A-Z]{1,2}\d/.test(pc)){
      if(!ukPostcodes[pc]) ukPostcodes[pc] = [];
      ukPostcodes[pc].push(i);
    }
  });

  var pcList = Object.keys(ukPostcodes);
  var batchSize = 100;
  var resolved = 0;
  var total = pcList.length;
  var batches = [];
  for(var i=0; i<pcList.length; i+=batchSize){
    batches.push(pcList.slice(i, i+batchSize));
  }

  var batchIdx = 0;
  function runBatch(){
    if(batchIdx >= batches.length){
      document.getElementById("loadingMsg").textContent = "All postcodes mapped!";
      setTimeout(function(){ document.getElementById("loadingMsg").style.display="none"; }, 3000);
      return;
    }
    var batch = batches[batchIdx];
    document.getElementById("loadingMsg").textContent = "Geocoding... " + resolved + "/" + total;

    fetch("https://api.postcodes.io/postcodes", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({postcodes: batch})
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.result){
        data.result.forEach(function(item){
          if(item.result){
            var pc = item.query.toUpperCase();
            var indices = ukPostcodes[pc] || [];
            indices.forEach(function(idx){
              var m = allMarkers[idx];
              var newLat = item.result.latitude;
              var newLng = item.result.longitude;
              clusters.removeLayer(m);
              m.setLatLng([newLat, newLng]);
              m._cdata.lat = newLat;
              m._cdata.lng = newLng;
              clusters.addLayer(m);
              resolved++;
            });
          }
        });
      }
      batchIdx++;
      setTimeout(runBatch, 300);
    })
    .catch(function(err){
      console.log("Geocode batch error:", err);
      document.getElementById("loadingMsg").textContent = "Using approximate locations (API unavailable)";
      setTimeout(function(){ document.getElementById("loadingMsg").style.display="none"; }, 5000);
    });
  }

  runBatch();
}

/* Start geocoding after map loads */
setTimeout(geocodeAndUpdate, 500);
}

function filterMarkers(){
  var s=document.getElementById("searchInput").value.toLowerCase();
  var ow=document.getElementById("ownerFilter").value;
  var ind=document.getElementById("industryFilter").value;
  var count=0;
  clusters.clearLayers();
  allMarkers.forEach(function(m){
    var d=m._cdata, show=true;
    if(s&&d.name.toLowerCase().indexOf(s)===-1)show=false;
    if(ow&&d.owner!==ow)show=false;
    if(ind&&d.industry!==ind)show=false;
    if(show){clusters.addLayer(m);count++}
  });
  document.getElementById("visibleCount").textContent=count;
}

function resetFilters(){
  document.getElementById("searchInput").value="";
  document.getElementById("ownerFilter").value="";
  document.getElementById("industryFilter").value="";
  filterMarkers();
}
